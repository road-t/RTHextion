name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── macOS arm64 (Apple Silicon) ────────────────────────────────
  build-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          cache: true

      - name: Build
        run: |
          mkdir build_ci && cd build_ci
          ${{ env.QT_ROOT_DIR }}/bin/qmake ../src/rthextion.pro CONFIG+=release QMAKE_APPLE_DEVICE_ARCHS=arm64
          make -j$(sysctl -n hw.logicalcpu)

      - name: Install DMG packager
        run: brew install create-dmg

      - name: Package DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          ${{ env.QT_ROOT_DIR }}/bin/macdeployqt build_ci/RTHextion.app
          xattr -cr build_ci/RTHextion.app

          if [ -n "${MACOS_SIGN_IDENTITY}" ]; then
            echo "Signing app with Developer ID: ${MACOS_SIGN_IDENTITY}"
            codesign --force --deep --options runtime --sign "${MACOS_SIGN_IDENTITY}" build_ci/RTHextion.app
            codesign --verify --deep --strict --verbose=2 build_ci/RTHextion.app
          else
            echo "No Developer ID — ad-hoc signing"
            codesign --force --deep --sign - build_ci/RTHextion.app
          fi

          mkdir -p dmg_root
          cp -R build_ci/RTHextion.app dmg_root/
          create-dmg \
            --volname "RTHextion" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 110 \
            --icon "RTHextion.app" 220 190 \
            --hide-extension "RTHextion.app" \
            --app-drop-link 580 190 \
            "RTHextion-macOS-arm64.dmg" \
            "dmg_root/"

          if [ -n "${MACOS_SIGN_IDENTITY}" ] && [ -n "${MACOS_NOTARY_APPLE_ID}" ] && [ -n "${MACOS_NOTARY_TEAM_ID}" ] && [ -n "${MACOS_NOTARY_PASSWORD}" ]; then
            echo "Submitting DMG for notarization"
            xcrun notarytool submit "RTHextion-macOS-arm64.dmg" \
              --apple-id "${MACOS_NOTARY_APPLE_ID}" \
              --team-id "${MACOS_NOTARY_TEAM_ID}" \
              --password "${MACOS_NOTARY_PASSWORD}" \
              --wait
            xcrun stapler staple "RTHextion-macOS-arm64.dmg"
          else
            echo "Notarization secrets are not fully set; skipping notarization"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RTHextion-macOS-arm64
          path: RTHextion-macOS-arm64.dmg

  # ─── macOS x86_64 (Intel) ────────────────────────────────────────
  build-macos-x86_64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          cache: true

      - name: Build
        run: |
          mkdir build_ci && cd build_ci
          ${{ env.QT_ROOT_DIR }}/bin/qmake ../src/rthextion.pro CONFIG+=release QMAKE_APPLE_DEVICE_ARCHS=x86_64
          make -j$(sysctl -n hw.logicalcpu)

      - name: Install DMG packager
        run: brew install create-dmg

      - name: Package DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          ${{ env.QT_ROOT_DIR }}/bin/macdeployqt build_ci/RTHextion.app
          xattr -cr build_ci/RTHextion.app

          if [ -n "${MACOS_SIGN_IDENTITY}" ]; then
            echo "Signing app with Developer ID: ${MACOS_SIGN_IDENTITY}"
            codesign --force --deep --options runtime --sign "${MACOS_SIGN_IDENTITY}" build_ci/RTHextion.app
            codesign --verify --deep --strict --verbose=2 build_ci/RTHextion.app
          else
            echo "No Developer ID — ad-hoc signing"
            codesign --force --deep --sign - build_ci/RTHextion.app
          fi

          mkdir -p dmg_root
          cp -R build_ci/RTHextion.app dmg_root/
          create-dmg \
            --volname "RTHextion" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 110 \
            --icon "RTHextion.app" 220 190 \
            --hide-extension "RTHextion.app" \
            --app-drop-link 580 190 \
            "RTHextion-macOS-x86_64.dmg" \
            "dmg_root/"

          if [ -n "${MACOS_SIGN_IDENTITY}" ] && [ -n "${MACOS_NOTARY_APPLE_ID}" ] && [ -n "${MACOS_NOTARY_TEAM_ID}" ] && [ -n "${MACOS_NOTARY_PASSWORD}" ]; then
            echo "Submitting DMG for notarization"
            xcrun notarytool submit "RTHextion-macOS-x86_64.dmg" \
              --apple-id "${MACOS_NOTARY_APPLE_ID}" \
              --team-id "${MACOS_NOTARY_TEAM_ID}" \
              --password "${MACOS_NOTARY_PASSWORD}" \
              --wait
            xcrun stapler staple "RTHextion-macOS-x86_64.dmg"
          else
            echo "Notarization secrets are not fully set; skipping notarization"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RTHextion-macOS-x86_64
          path: RTHextion-macOS-x86_64.dmg

  # ─── Windows x64 (MSVC) ──────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate .qm translation files
        shell: cmd
        run: |
          if exist "%QT_ROOT_DIR%\bin\lrelease.exe" (
            "%QT_ROOT_DIR%\bin\lrelease.exe" src\rthextion.pro
          ) else (
            echo lrelease.exe not found in %QT_ROOT_DIR%\bin
            exit /b 1
          )

      - name: Build
        shell: cmd
        run: |
          mkdir build_ci
          cd build_ci
          "%QT_ROOT_DIR%\bin\qmake" ..\src\rthextion.pro CONFIG+=release
          nmake

      - name: Deploy Qt dependencies
        shell: cmd
        run: |
          mkdir RTHextion-Windows
          copy build_ci\release\RTHextion.exe RTHextion-Windows\
          "%QT_ROOT_DIR%\bin\windeployqt" --release --no-translations RTHextion-Windows\RTHextion.exe

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path RTHextion-Windows\* -DestinationPath RTHextion-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RTHextion-Windows-x64
          path: RTHextion-Windows-x64.zip

  # ─── Linux x86_64 (AppImage) ─────────────────────────────────────
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-base-dev-tools qt6-tools-dev-tools qt6-l10n-tools \
            clang \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libfontconfig1-dev libfreetype6-dev libxrender-dev \
            libxext-dev libx11-dev libxcb1-dev \
            libfuse2 imagemagick

      - name: Generate .qm translation files
        run: |
          # Generate from TS files directly to avoid qmake/qtchooser differences
          if [ -x "/usr/lib/qt6/bin/lrelease" ]; then
            /usr/lib/qt6/bin/lrelease src/translations/qhexedit_ru.ts src/translations/qhexedit_de.ts
          elif command -v lrelease-qt6 >/dev/null 2>&1; then
            lrelease-qt6 src/translations/qhexedit_ru.ts src/translations/qhexedit_de.ts
          else
            echo "lrelease not found, searching..."
            find /usr -name 'lrelease' 2>/dev/null
            exit 1
          fi

      - name: Build
        run: |
          if command -v qmake6 >/dev/null 2>&1; then
            QMAKE_BIN="$(command -v qmake6)"
          elif [ -x "/usr/lib/qt6/bin/qmake" ]; then
            QMAKE_BIN="/usr/lib/qt6/bin/qmake"
          elif [ -x "/usr/lib/qt6/bin/qmake6" ]; then
            QMAKE_BIN="/usr/lib/qt6/bin/qmake6"
          else
            echo "qmake (Qt6) not found"
            find /usr -name 'qmake*' 2>/dev/null || true
            exit 1
          fi

          echo "Using qmake: $QMAKE_BIN"
          "$QMAKE_BIN" -v
          mkdir build_ci && cd build_ci
          "$QMAKE_BIN" ../src/rthextion.pro CONFIG+=release QMAKE_CC=clang QMAKE_CXX=clang++
          set -o pipefail
          make -j$(nproc) 2>&1 | tee build.log

      - name: Prepare AppImage resources
        run: |
          # Desktop entry (no leading whitespace!)
          cat > RTHextion.desktop << 'EOF'
[Desktop Entry]
Name=RTHextion
Exec=RTHextion
Icon=RTHextion
Type=Application
Categories=Utility;
EOF
          # Extract icon from ICO
          convert 'src/images/qhexedit.ico[0]' RTHextion.png

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          # Find qmake for the Qt plugin
          if command -v qmake6 >/dev/null 2>&1; then
            export QMAKE="$(command -v qmake6)"
          elif [ -x "/usr/lib/qt6/bin/qmake" ]; then
            export QMAKE="/usr/lib/qt6/bin/qmake"
          fi
          echo "QMAKE=$QMAKE"

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build_ci/RTHextion \
            --desktop-file RTHextion.desktop \
            --icon-file RTHextion.png \
            --plugin qt \
            --output appimage

      - name: Prepare AppImage artifact
        run: |
          mv RTHextion-*.AppImage RTHextion-Linux-x86_64.AppImage 2>/dev/null \
            || mv RTHextion*.AppImage RTHextion-Linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RTHextion-Linux-x86_64
          path: RTHextion-Linux-x86_64.AppImage

  # ─── Linux arm64 (AppImage) ──────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-base-dev-tools qt6-tools-dev-tools qt6-l10n-tools \
            clang \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libfontconfig1-dev libfreetype6-dev libxrender-dev \
            libxext-dev libx11-dev libxcb1-dev \
            libfuse2 imagemagick

      - name: Generate .qm translation files
        run: |
          if [ -x "/usr/lib/qt6/bin/lrelease" ]; then
            /usr/lib/qt6/bin/lrelease src/translations/qhexedit_ru.ts src/translations/qhexedit_de.ts
          elif command -v lrelease-qt6 >/dev/null 2>&1; then
            lrelease-qt6 src/translations/qhexedit_ru.ts src/translations/qhexedit_de.ts
          else
            echo "lrelease not found"
            exit 1
          fi

      - name: Build
        run: |
          if command -v qmake6 >/dev/null 2>&1; then
            QMAKE_BIN="$(command -v qmake6)"
          elif [ -x "/usr/lib/qt6/bin/qmake" ]; then
            QMAKE_BIN="/usr/lib/qt6/bin/qmake"
          elif [ -x "/usr/lib/qt6/bin/qmake6" ]; then
            QMAKE_BIN="/usr/lib/qt6/bin/qmake6"
          else
            echo "qmake (Qt6) not found"
            exit 1
          fi

          mkdir build_ci && cd build_ci
          "$QMAKE_BIN" ../src/rthextion.pro CONFIG+=release QMAKE_CC=clang QMAKE_CXX=clang++
          make -j$(nproc)

      - name: Prepare AppImage resources
        run: |
          cat > RTHextion.desktop << 'EOF'
[Desktop Entry]
Name=RTHextion
Exec=RTHextion
Icon=RTHextion
Type=Application
Categories=Utility;
EOF
          convert 'src/images/qhexedit.ico[0]' RTHextion.png

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-aarch64.AppImage
          chmod +x linuxdeploy-aarch64.AppImage linuxdeploy-plugin-qt-aarch64.AppImage

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          if command -v qmake6 >/dev/null 2>&1; then
            export QMAKE="$(command -v qmake6)"
          elif [ -x "/usr/lib/qt6/bin/qmake" ]; then
            export QMAKE="/usr/lib/qt6/bin/qmake"
          fi
          echo "QMAKE=$QMAKE"

          ./linuxdeploy-aarch64.AppImage \
            --appdir AppDir \
            --executable build_ci/RTHextion \
            --desktop-file RTHextion.desktop \
            --icon-file RTHextion.png \
            --plugin qt \
            --output appimage

      - name: Prepare AppImage artifact
        run: |
          mv RTHextion-*.AppImage RTHextion-Linux-arm64.AppImage 2>/dev/null \
            || mv RTHextion*.AppImage RTHextion-Linux-arm64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RTHextion-Linux-arm64
          path: RTHextion-Linux-arm64.AppImage

  # ─── Create GitHub Release ───────────────────────────────────────
  release:
    needs: [build-macos-arm64, build-macos-x86_64, build-windows, build-linux-x86_64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/RTHextion-macOS-arm64/RTHextion-macOS-arm64.dmg
            artifacts/RTHextion-macOS-x86_64/RTHextion-macOS-x86_64.dmg
            artifacts/RTHextion-Windows-x64/RTHextion-Windows-x64.zip
            artifacts/RTHextion-Linux-x86_64/RTHextion-Linux-x86_64.AppImage
            artifacts/RTHextion-Linux-arm64/RTHextion-Linux-arm64.AppImage
